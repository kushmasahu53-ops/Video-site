<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — RXS Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --w:#ffffff; --off:#f7f7f9; --soft:#f0f0f5;
  --line:#e4e4ed; --line2:#d0d0e0;
  --ink:#0d0d1a; --ink2:#3a3a55; --ink3:#7a7a99;
  --gold:#e6a800; --gold-l:#fff7e0; --gold-m:#ffd54f;
  --green:#16a34a; --green-l:#f0fdf4;
  --red:#dc2626; --red-l:#fff1f1;
  --r:14px; --sh:0 2px 16px rgba(13,13,26,0.07); --shl:0 8px 40px rgba(13,13,26,0.11);
}
body { font-family:'Inter',sans-serif; background:var(--off); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* LOGIN */
#loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--w); }
.login-card { width:100%; max-width:370px; background:var(--w); border:1.5px solid var(--line); border-radius:20px; padding:38px 34px; box-shadow:var(--shl); }
.login-mark { width:44px; height:44px; background:var(--ink); border-radius:11px; display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:800; font-size:14px; color:var(--gold-m); margin-bottom:22px; }
.login-card h1 { font-family:'Sora',sans-serif; font-size:21px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; }
.login-card > p { font-size:13px; color:var(--ink3); margin-bottom:26px; }
.field { margin-bottom:13px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px; }
.field input, .field textarea, .field select {
  width:100%; background:var(--off); border:1.5px solid var(--line); border-radius:10px;
  padding:10px 13px; font-family:'Inter',sans-serif; font-size:13px; color:var(--ink); outline:none;
  transition:border-color .18s, box-shadow .18s;
}
.field input:focus, .field textarea:focus { border-color:var(--ink); background:var(--w); box-shadow:0 0 0 3px rgba(13,13,26,.05); }
.field textarea { resize:vertical; min-height:70px; }
.btn-login { width:100%; margin-top:4px; background:var(--ink); color:var(--w); border:none; border-radius:10px; padding:12px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background .18s; }
.btn-login:hover { background:var(--ink2); }
.err-box { display:none; margin-top:10px; background:var(--red-l); border:1px solid #fca5a5; border-radius:8px; padding:9px 13px; font-size:13px; color:var(--red); }

/* DASHBOARD */
#dashboard { display:none; }
.topbar { position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.93); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); height:54px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; }
.tl { display:flex; align-items:center; gap:9px; }
.t-mark { width:28px; height:28px; background:var(--ink); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-size:11px; font-weight:800; color:var(--gold-m); }
.t-name { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; color:var(--ink); }
.t-sep { width:1px; height:16px; background:var(--line); }
.t-sub { font-size:12px; color:var(--ink3); }
.btn-logout { background:transparent; border:1.5px solid var(--line); border-radius:7px; padding:6px 13px; font-family:'Inter',sans-serif; font-size:12px; color:var(--ink3); cursor:pointer; transition:all .18s; }
.btn-logout:hover { border-color:var(--red); color:var(--red); }

.content { max-width:820px; margin:0 auto; padding:28px 20px 60px; }

/* BREADCRUMB */
.breadcrumb { display:flex; align-items:center; gap:6px; margin-bottom:20px; font-size:13px; color:var(--ink3); }
.bc-link { cursor:pointer; color:var(--ink3); transition:color .15s; }
.bc-link:hover { color:var(--ink); }
.bc-sep { color:var(--line2); }
.bc-current { color:var(--ink); font-weight:600; }

/* PAGE HEADER */
.pg-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; gap:14px; }
.pg-head h2 { font-family:'Sora',sans-serif; font-size:20px; font-weight:800; letter-spacing:-.4px; }
.pg-head p { font-size:12px; color:var(--ink3); margin-top:3px; }
.btn-add { display:flex; align-items:center; gap:6px; background:var(--ink); color:var(--w); border:none; border-radius:9px; padding:9px 16px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background .18s; white-space:nowrap; flex-shrink:0; }
.btn-add:hover { background:var(--ink2); }

/* INSTITUTE ROWS */
.list { display:flex; flex-direction:column; gap:9px; }

.inst-row {
  background:var(--w); border:1.5px solid var(--line); border-radius:var(--r);
  display:flex; align-items:center; gap:0; overflow:hidden;
  transition:border-color .18s, box-shadow .18s;
}
.row-bar { width:4px; min-height:64px; flex-shrink:0; }
.row-logo { width:44px; height:44px; border-radius:9px; background:var(--soft); margin:10px 13px; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:18px; }
.row-logo img { width:100%; height:100%; object-fit:cover; }
.row-info { flex:1; min-width:0; padding:12px 0; }
.row-info h4 { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-info p { font-size:12px; color:var(--ink3); margin-top:2px; }
.row-right { display:flex; align-items:center; gap:8px; padding:0 14px; flex-shrink:0; }
.count-pill { background:var(--soft); border:1px solid var(--line); border-radius:6px; padding:3px 9px; font-size:11px; font-weight:600; color:var(--ink2); white-space:nowrap; }
.btn-open-batches { background:var(--off); border:1.5px solid var(--line); border-radius:8px; padding:6px 13px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--ink2); cursor:pointer; transition:all .18s; white-space:nowrap; }
.btn-open-batches:hover { border-color:var(--ink); color:var(--ink); background:var(--soft); }
.i-btn { width:32px; height:32px; background:var(--off); border:1.5px solid var(--line); border-radius:7px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .18s; }
.i-btn.edit:hover { border-color:var(--ink); background:var(--soft); }
.i-btn.del:hover { border-color:var(--red); background:var(--red-l); }

/* BATCH ROWS */
.batch-row {
  background:var(--w); border:1.5px solid var(--line); border-radius:var(--r);
  display:flex; align-items:center; gap:0; overflow:hidden;
  transition:border-color .18s, box-shadow .18s;
}
.batch-bar { width:3px; min-height:56px; flex-shrink:0; }
.batch-thumb { width:40px; height:40px; border-radius:8px; background:var(--soft); margin:8px 12px; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:16px; }
.batch-thumb img { width:100%; height:100%; object-fit:cover; }
.batch-info { flex:1; min-width:0; padding:10px 0; }
.batch-info h4 { font-family:'Sora',sans-serif; font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.batch-info p { font-size:11px; color:var(--ink3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.batch-right { display:flex; align-items:center; gap:7px; padding:0 12px; flex-shrink:0; }
.batch-tag { background:var(--gold-l); border:1px solid #ffd54f55; color:var(--gold); border-radius:5px; padding:2px 8px; font-size:10px; font-weight:700; }

/* BACK BAR */
.back-bar { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.btn-back-sm { background:var(--off); border:1.5px solid var(--line); border-radius:8px; padding:7px 14px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--ink2); cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .18s; }
.btn-back-sm:hover { background:var(--soft); border-color:var(--line2); }
.back-bar-title { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; }

/* MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(13,13,26,.45); z-index:200; align-items:center; justify-content:center; padding:20px; }
.overlay.open { display:flex; }
.modal { background:var(--w); border:1.5px solid var(--line); border-radius:20px; padding:30px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--shl); }
.modal-head { margin-bottom:22px; }
.modal-head h3 { font-family:'Sora',sans-serif; font-size:17px; font-weight:800; letter-spacing:-.3px; }
.modal-head p { font-size:12px; color:var(--ink3); margin-top:3px; }
.modal-actions { display:flex; gap:9px; margin-top:22px; }
.btn-cancel { flex:1; background:var(--off); border:1.5px solid var(--line); border-radius:9px; padding:11px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; color:var(--ink2); cursor:pointer; transition:background .18s; }
.btn-cancel:hover { background:var(--soft); }
.btn-save { flex:2; background:var(--ink); color:var(--w); border:none; border-radius:9px; padding:11px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background .18s; }
.btn-save:hover { background:var(--ink2); }

/* EMPTY */
.empty-state { background:var(--w); border:1.5px dashed var(--line2); border-radius:var(--r); padding:48px 20px; text-align:center; color:var(--ink3); }
.empty-state .e-icon { font-size:32px; margin-bottom:10px; opacity:.5; }
.empty-state h4 { font-family:'Sora',sans-serif; font-size:15px; color:var(--ink2); font-weight:700; margin-bottom:5px; }
.empty-state p { font-size:12px; }

/* TOAST */
.toast { position:fixed; bottom:22px; right:22px; background:var(--ink); color:var(--w); border-radius:9px; padding:12px 18px; font-size:13px; font-weight:500; z-index:999; transform:translateY(80px); opacity:0; transition:all .28s cubic-bezier(.34,1.56,.64,1); max-width:280px; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok { background:var(--green); }
.toast.fail { background:var(--red); }

.spinner { width:26px; height:26px; border:2.5px solid var(--line); border-top-color:var(--ink); border-radius:50%; animation:spin .75s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-s { padding:36px 20px; text-align:center; color:var(--ink3); font-size:13px; }

@media(max-width:600px) {
  .content { padding:20px 16px 60px; }
  .modal { padding:22px 18px; }
  .topbar { padding:0 16px; }
  .t-sep,.t-sub { display:none; }
  .count-pill { display:none; }
}

const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4'];
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-mark">RX</div>
    <h1>Admin Panel</h1>
    <p>Sign in to manage your portal</p>
    <div class="field"><label>Username</label><input type="text" id="uname" placeholder="Enter username" /></div>
    <div class="field"><label>Password</label><input type="password" id="upass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-login" onclick="doLogin()">Sign in →</button>
    <div class="err-box" id="errBox">Incorrect username or password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="topbar">
    <div class="tl">
      <div class="t-mark">RX</div>
      <span class="t-name">RXS Portal</span>
      <div class="t-sep"></div>
      <span class="t-sub">Admin</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sign out</button>
  </nav>

  <div class="content">
    <!-- INSTITUTES VIEW -->
    <div id="instView">
      <div class="pg-head">
        <div><h2>Institutes</h2><p id="instSubCount">Loading…</p></div>
        <button class="btn-add" onclick="openAddInst()">+ Add Institute</button>
      </div>
      <div id="instList">
        <div class="loading-s"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- BATCHES VIEW -->
    <div id="batchesView" style="display:none;">
      <div class="back-bar">
        <button class="btn-back-sm" onclick="showInstView()">← Back</button>
        <span class="back-bar-title" id="bvTitle">Batches</span>
      </div>
      <div class="pg-head">
        <div><h2 id="bvInstName">Institute</h2><p id="bvSubCount"></p></div>
        <button class="btn-add" onclick="openAddBatch()">+ Add Batch</button>
      </div>
      <div id="batchList">
        <div class="loading-s"><div class="spinner"></div>Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="mTitle">Add</h3><p id="mSub"></p></div>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BIN_ID = '6a3019c2da38895dfec463b5';
const KEY = '$2a$10$ZvJXK0tZDFnVp7i4K6WL8ulOCKwRo3vYSwvJ3zQlekyCzTVajImJa';
const URL_BASE = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const A_USER = 'admin', A_PASS = 'rxs@2024';
const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4'];

let institutes = [];
let currentInstIdx = null;
let modalMode = ''; // 'addInst' | 'editInst' | 'addBatch' | 'editBatch'
let editingIdx = null;

function doLogin() {
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value;
  if (u === A_USER && p === A_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    load();
  } else { document.getElementById('errBox').style.display = 'block'; }
}
function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('uname').value = '';
  document.getElementById('upass').value = '';
  document.getElementById('errBox').style.display = 'none';
}

async function load() {
  try {
    const r = await fetch(`${URL_BASE}/latest`, { headers:{'X-Master-Key':KEY} });
    const d = await r.json();
    institutes = d.record.institutes || [];
    renderInstList();
  } catch { toast('Failed to load','fail'); }
}

async function push() {
  const r = await fetch(URL_BASE, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':KEY},
    body: JSON.stringify({ institutes })
  });
  if (!r.ok) throw new Error();
}

/* ── INSTITUTES ── */
function showInstView() {
  document.getElementById('instView').style.display = 'block';
  document.getElementById('batchesView').style.display = 'none';
  currentInstIdx = null;
}

function renderInstList() {
  const el = document.getElementById('instList');
  document.getElementById('instSubCount').textContent = `${institutes.length} institute${institutes.length!==1?'s':''}`;
  if (!institutes.length) {
    el.innerHTML = `<div class="empty-state"><div class="e-icon">🏛</div><h4>No institutes yet</h4><p>Click "Add Institute" to get started.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="list">${institutes.map((inst,i) => {
    const color = COLORS[i%COLORS.length];
    const bc = (inst.batches||[]).length;
    return `<div class="inst-row">
      <div class="row-bar" style="background:${color}"></div>
      <div class="row-logo">${inst.logo?`<img src="${inst.logo}" onerror="this.parentElement.innerHTML='🏫'"/>`:'🏫'}</div>
      <div class="row-info"><h4>${inst.name}</h4><p>${inst.description||'No description'}</p></div>
      <div class="row-right">
        <span class="count-pill">${bc} batch${bc!==1?'es':''}</span>
        <button class="btn-open-batches" onclick="showBatchView(${i})">Batches →</button>
        <button class="i-btn edit" onclick="openEditInst(${i})">✏️</button>
        <button class="i-btn del" onclick="delInst(${i})">🗑️</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openAddInst() {
  modalMode = 'addInst'; editingIdx = null;
  document.getElementById('mTitle').textContent = 'Add Institute';
  document.getElementById('mSub').textContent = 'Add a new institute';
  document.getElementById('modalFields').innerHTML = instFields('','','');
  document.getElementById('overlay').classList.add('open');
}
function openEditInst(i) {
  modalMode = 'editInst'; editingIdx = i;
  const inst = institutes[i];
  document.getElementById('mTitle').textContent = 'Edit Institute';
  document.getElementById('mSub').textContent = inst.name;
  document.getElementById('modalFields').innerHTML = instFields(inst.name, inst.description||'', inst.logo||'');
  document.getElementById('overlay').classList.add('open');
}
function instFields(name, desc, logo) {
  return `
    <div class="field"><label>Institute Name *</label><input type="text" id="fName" value="${name}" placeholder="e.g. Allen Kota"/></div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Short description…">${desc}</textarea></div>
    <div class="field"><label>Logo URL</label><input type="url" id="fLogo" value="${logo}" placeholder="https://… (image link)"/></div>`;
}
async function saveInstModal() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Name is required','fail'); return; }
  const obj = { id: editingIdx!==null ? institutes[editingIdx].id : Date.now().toString(), name, description: document.getElementById('fDesc').value.trim(), logo: document.getElementById('fLogo').value.trim(), batches: editingIdx!==null ? institutes[editingIdx].batches : [] };
  if (editingIdx!==null) institutes[editingIdx]=obj; else institutes.push(obj);
  try { await push(); renderInstList(); closeModal(); toast(editingIdx!==null?'Institute updated!':'Institute added!','ok'); } catch { toast('Save failed','fail'); }
}
async function delInst(i) {
  if (!confirm(`Delete "${institutes[i].name}" and all its batches?`)) return;
  institutes.splice(i,1);
  try { await push(); renderInstList(); toast('Deleted','ok'); } catch { toast('Delete failed','fail'); }
}

/* ── BATCHES ── */
function showBatchView(i) {
  currentInstIdx = i;
  const inst = institutes[i];
  document.getElementById('instView').style.display = 'none';
  document.getElementById('batchesView').style.display = 'block';
  document.getElementById('bvTitle').textContent = inst.name;
  document.getElementById('bvInstName').textContent = inst.name;
  renderBatchList();
}
function renderBatchList() {
  const inst = institutes[currentInstIdx];
  const batches = inst.batches || [];
  const color = COLORS[currentInstIdx % COLORS.length];
  document.getElementById('bvSubCount').textContent = `${batches.length} batch${batches.length!==1?'es':''}`;
  const el = document.getElementById('batchList');
  if (!batches.length) {
    el.innerHTML = `<div class="empty-state"><div class="e-icon">📚</div><h4>No batches yet</h4><p>Click "Add Batch" to add one.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="list">${batches.map((b,bi)=>`
    <div class="batch-row">
      <div class="batch-bar" style="background:${color}"></div>
      <div class="batch-thumb">${b.thumbnail?`<img src="${b.thumbnail}" onerror="this.parentElement.innerHTML='📖'"/>`:'📖'}</div>
      <div class="batch-info"><h4>${b.name}</h4><p>${b.url}</p></div>
      <div class="batch-right">
        ${b.tag?`<span class="batch-tag">${b.tag}</span>`:''}
        <button class="i-btn edit" onclick="openEditBatch(${bi})">✏️</button>
        <button class="i-btn del" onclick="delBatch(${bi})">🗑️</button>
      </div>
    </div>`).join('')}</div>`;
}
function openAddBatch() {
  modalMode = 'addBatch'; editingIdx = null;
  document.getElementById('mTitle').textContent = 'Add Batch';
  document.getElementById('mSub').textContent = `Adding to: ${institutes[currentInstIdx].name}`;
  document.getElementById('modalFields').innerHTML = batchFields('','','','','');
  document.getElementById('overlay').classList.add('open');
}
function openEditBatch(bi) {
  modalMode = 'editBatch'; editingIdx = bi;
  const b = institutes[currentInstIdx].batches[bi];
  document.getElementById('mTitle').textContent = 'Edit Batch';
  document.getElementById('mSub').textContent = b.name;
  document.getElementById('modalFields').innerHTML = batchFields(b.name, b.url, b.description||'', b.thumbnail||'', b.tag||'');
  document.getElementById('overlay').classList.add('open');
}
function batchFields(name, url, desc, thumb, tag) {
  return `
    <div class="field"><label>Batch Name *</label><input type="text" id="fName" value="${name}" placeholder="e.g. Arjuna JEE 2027"/></div>
    <div class="field"><label>Delta Study URL *</label><input type="url" id="fUrl" value="${url}" placeholder="https://deltastudy.site/study-v2/batches/…"/></div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Short description…">${desc}</textarea></div>
    <div class="field"><label>Thumbnail URL</label><input type="url" id="fThumb" value="${thumb}" placeholder="https://… (image link)"/></div>
    <div class="field"><label>Tag</label><input type="text" id="fTag" value="${tag}" placeholder="e.g. JEE, NEET"/></div>`;
}
async function saveBatchModal() {
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  if (!name||!url) { toast('Name and URL required','fail'); return; }
  const b = { id: editingIdx!==null ? institutes[currentInstIdx].batches[editingIdx].id : Date.now().toString(), name, url, description: document.getElementById('fDesc').value.trim(), thumbnail: document.getElementById('fThumb').value.trim(), tag: document.getElementById('fTag').value.trim() };
  if (!institutes[currentInstIdx].batches) institutes[currentInstIdx].batches = [];
  if (editingIdx!==null) institutes[currentInstIdx].batches[editingIdx]=b; else institutes[currentInstIdx].batches.push(b);
  try { await push(); renderBatchList(); closeModal(); toast(editingIdx!==null?'Batch updated!':'Batch added!','ok'); } catch { toast('Save failed','fail'); }
}
async function delBatch(bi) {
  if (!confirm(`Delete "${institutes[currentInstIdx].batches[bi].name}"?`)) return;
  institutes[currentInstIdx].batches.splice(bi,1);
  try { await push(); renderBatchList(); toast('Deleted','ok'); } catch { toast('Delete failed','fail'); }
}

/* ── MODAL ── */
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function saveModal() {
  if (modalMode==='addInst'||modalMode==='editInst') saveInstModal();
  else saveBatchModal();
}
document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeModal(); });

/* ── TOAST ── */
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3000);
}

load();
</script>
</body>
</html>
