<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — VideoZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--accent:#e53935;--text:#f1f1f1;--muted:#888;--green:#00c853}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

    /* LOGIN */
    #loginScreen{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:36px 32px;width:100%;max-width:360px;
      text-align:center;
    }
    .login-box h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
    .login-box p{color:var(--muted);font-size:0.85rem;margin-bottom:24px}
    .login-box input{
      width:100%;padding:12px 14px;
      background:var(--bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);
      font-family:'Inter',sans-serif;font-size:1rem;
      text-align:center;letter-spacing:3px;margin-bottom:14px;outline:none;
      transition:border-color 0.2s;
    }
    .login-box input:focus{border-color:#444}
    .btn-login{
      width:100%;padding:12px;background:var(--accent);
      border:none;border-radius:8px;color:#fff;
      font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;
      cursor:pointer;transition:opacity 0.2s;
    }
    .btn-login:hover{opacity:0.88}
    .login-err{color:var(--accent);font-size:0.82rem;margin-top:10px;display:none}

    /* ADMIN */
    #adminPanel{display:none}
    nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;height:60px;background:#111;
      border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
    }
    .logo{font-size:1.1rem;font-weight:700;color:var(--text)}
    .logo span{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:14px}
    .nav-right a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;transition:color 0.2s}
    .nav-right a:hover{color:var(--text)}
    .btn-logout{
      background:transparent;border:1px solid var(--border);
      border-radius:6px;padding:6px 16px;color:var(--muted);
      font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;
      cursor:pointer;transition:all 0.2s;
    }
    .btn-logout:hover{border-color:#555;color:var(--text)}

    .container{max-width:800px;margin:0 auto;padding:28px 24px}

    .section-label{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--text)}

    /* FORM CARD */
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;padding:24px;margin-bottom:28px;
    }
    .form-group{margin-bottom:16px}
    .form-group label{
      display:block;font-size:0.78rem;font-weight:600;
      letter-spacing:1px;text-transform:uppercase;
      color:var(--muted);margin-bottom:7px;
    }
    .form-group input,
    .form-group textarea{
      width:100%;padding:11px 14px;
      background:var(--bg);border:1px solid var(--border);
      border-radius:7px;color:var(--text);
      font-family:'Inter',sans-serif;font-size:0.92rem;
      outline:none;transition:border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus{border-color:#444}
    .form-group textarea{resize:vertical;min-height:80px;line-height:1.6}

    /* FILE DROP */
    .file-drop{
      border:1.5px dashed var(--border);border-radius:8px;
      padding:28px 20px;text-align:center;cursor:pointer;
      transition:border-color 0.2s,background 0.2s;position:relative;
    }
    .file-drop:hover{border-color:#555;background:rgba(255,255,255,0.02)}
    .file-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .file-drop-icon{font-size:1.8rem;margin-bottom:8px}
    .file-drop p{color:var(--muted);font-size:0.85rem}
    .file-selected{color:var(--green);font-size:0.82rem;font-weight:600;margin-top:7px}

    /* PROGRESS */
    .progress-wrap{display:none;margin-top:12px}
    .progress-bg{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width 0.3s}
    .progress-label{color:var(--muted);font-size:0.78rem;margin-top:6px}

    /* SUBMIT */
    .btn-submit{
      width:100%;padding:13px;background:var(--accent);
      border:none;border-radius:8px;color:#fff;
      font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;
      cursor:pointer;transition:opacity 0.2s;margin-top:8px;
    }
    .btn-submit:hover{opacity:0.88}
    .btn-submit:disabled{opacity:0.45;cursor:not-allowed}

    /* VIDEO LIST */
    .video-list{display:flex;flex-direction:column;gap:10px}
    .vi{
      display:flex;align-items:center;gap:14px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px 16px;
    }
    .vi-thumb{
      width:72px;height:46px;border-radius:6px;
      background:#111;overflow:hidden;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;color:#333;font-size:1.2rem;
    }
    .vi-thumb img{width:100%;height:100%;object-fit:cover}
    .vi-info{flex:1;min-width:0}
    .vi-title{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .vi-meta{color:var(--muted);font-size:0.78rem}
    .vi-actions{display:flex;gap:8px;flex-shrink:0}
    .btn-view{
      background:transparent;border:1px solid var(--border);
      border-radius:6px;padding:5px 13px;color:var(--muted);
      font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;
      cursor:pointer;text-decoration:none;transition:all 0.2s;
    }
    .btn-view:hover{border-color:#555;color:var(--text)}
    .btn-del{
      background:transparent;border:1px solid #3a1a1a;
      border-radius:6px;padding:5px 13px;color:var(--accent);
      font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;
      cursor:pointer;transition:all 0.2s;
    }
    .btn-del:hover{background:rgba(229,57,53,0.1)}

    .empty-list{text-align:center;padding:40px;color:var(--muted);font-size:0.88rem}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    .toast{
      position:fixed;bottom:20px;right:20px;
      padding:12px 20px;border-radius:8px;
      font-size:0.88rem;font-weight:600;
      background:var(--green);color:#000;
      transform:translateY(60px);opacity:0;
      transition:all 0.3s cubic-bezier(.22,1,.36,1);
      z-index:999;
    }
    .toast.error{background:var(--accent);color:#fff}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Admin Panel</h1>
    <p>VideoZone — Sirf Admin ke liye</p>
    <input type="password" id="passInput" placeholder="Password..." onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="login-err" id="loginErr">Galat password!</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <nav>
    <div class="logo">▶ Video<span>Zone</span> Admin</div>
    <div class="nav-right">
      <a href="index.html" target="_blank">Website →</a>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <div class="section-label">Nayi Video Upload Karo</div>
    <div class="card">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="vTitle" placeholder="Video ka naam..."/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="vDesc" placeholder="Optional..."></textarea>
      </div>
      <div class="form-group">
        <label>Duration (optional)</label>
        <input type="text" id="vDur" placeholder="Jaise: 4:32"/>
      </div>
      <div class="form-group">
        <label>Thumbnail</label>
        <div class="file-drop">
          <input type="file" id="thumbFile" accept="image/*" onchange="onThumb(this)"/>
          <div class="file-drop-icon">🖼️</div>
          <p>Image choose karo</p>
          <div class="file-selected" id="thumbName"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Video File *</label>
        <div class="file-drop">
          <input type="file" id="videoFile" accept="video/*" onchange="onVideo(this)"/>
          <div class="file-drop-icon">🎬</div>
          <p>MP4 file choose karo ya drag karo</p>
          <div class="file-selected" id="videoName"></div>
        </div>
        <div class="progress-wrap" id="progWrap">
          <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
          <div class="progress-label" id="progLabel">Upload ho rahi hai...</div>
        </div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="uploadVideo()">Upload Karo</button>
    </div>

    <div class="section-label">Uploaded Videos</div>
    <div class="video-list" id="videoList">
      <div class="empty-list"><div class="spinner"></div>Load ho rahi hain...</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvs0Nofybzj7l-gMAaJmMgE0DF8TurjTs",
    authDomain: "my-video-site-b973e.firebaseapp.com",
    projectId: "my-video-site-b973e",
    storageBucket: "my-video-site-b973e.firebasestorage.app",
    messagingSenderId: "308515367269",
    appId: "1:308515367269:web:19e2ee804c9f461a46d98c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const PASS = "admin123"; // Yahan apna password daalo

  window.doLogin = () => {
    if (document.getElementById('passInput').value === PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadList();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  };

  window.doLogout = () => {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('passInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
  };

  window.onThumb = (i) => { if(i.files[0]) document.getElementById('thumbName').textContent = '✓ ' + i.files[0].name; };
  window.onVideo = (i) => { if(i.files[0]) document.getElementById('videoName').textContent = '✓ ' + i.files[0].name; };

  function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast'+(err?' error':'')+' show';
    setTimeout(()=>t.className='toast'+(err?' error':''),3500);
  }

  function fileToBase64(file) {
    return new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(file); });
  }

  async function uploadToArchive(file, onPct) {
    const id = 'videozone-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);
    const url = `https://s3.us.archive.org/${id}/${encodeURIComponent(file.name)}`;
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', url);
      xhr.setRequestHeader('x-archive-auto-make-bucket','1');
      xhr.setRequestHeader('x-archive-meta-mediatype','movies');
      xhr.setRequestHeader('Content-Type', file.type||'video/mp4');
      xhr.upload.onprogress = e => { if(e.lengthComputable) onPct(Math.round(e.loaded/e.total*100)); };
      xhr.onload = () => {
        if (xhr.status>=200&&xhr.status<300) resolve(`https://archive.org/download/${id}/${encodeURIComponent(file.name)}`);
        else reject(new Error('Upload failed: '+xhr.status));
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(file);
    });
  }

  window.uploadVideo = async () => {
    const title = document.getElementById('vTitle').value.trim();
    const desc = document.getElementById('vDesc').value.trim();
    const dur = document.getElementById('vDur').value.trim();
    const vFile = document.getElementById('videoFile').files[0];
    const tFile = document.getElementById('thumbFile').files[0];
    if (!title) { toast('Title daalna zaroori hai!', true); return; }
    if (!vFile) { toast('Video file choose karo!', true); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Upload ho rahi hai...';
    document.getElementById('progWrap').style.display = 'block';

    try {
      const fill = document.getElementById('progFill');
      const label = document.getElementById('progLabel');
      label.textContent = 'Archive.org pe upload ho rahi hai...';
      const videoUrl = await uploadToArchive(vFile, pct => {
        fill.style.width = pct+'%';
        label.textContent = pct+'% complete...';
      });
      label.textContent = 'Firestore mein save ho raha hai...';
      let thumbnail = '';
      if (tFile) thumbnail = await fileToBase64(tFile);
      await addDoc(collection(db,'videos'), { title, description:desc, duration:dur, videoUrl, thumbnail, createdAt:serverTimestamp() });
      toast('✓ Video upload ho gayi!');
      ['vTitle','vDesc','vDur'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('videoFile').value='';
      document.getElementById('thumbFile').value='';
      document.getElementById('videoName').textContent='';
      document.getElementById('thumbName').textContent='';
      document.getElementById('progWrap').style.display='none';
      fill.style.width='0%';
      loadList();
    } catch(e) { toast('Error: '+e.message, true); }
    finally { btn.disabled=false; btn.textContent='Upload Karo'; }
  };

  function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate?ts.toDate():new Date(ts);
    const s = Math.floor((Date.now()-d)/1000);
    if(s<60) return 'Abhi abhi';
    if(s<3600) return Math.floor(s/60)+' min pehle';
    if(s<86400) return Math.floor(s/3600)+' ghante pehle';
    return Math.floor(s/86400)+' din pehle';
  }

  async function loadList() {
    const list = document.getElementById('videoList');
    try {
      const snap = await getDocs(query(collection(db,'videos'), orderBy('createdAt','desc')));
      if (snap.empty) { list.innerHTML='<div class="empty-list">Abhi koi video nahi hai.</div>'; return; }
      list.innerHTML = '';
      snap.forEach(d => {
        const v = d.data();
        const el = document.createElement('div');
        el.className = 'vi';
        el.innerHTML = `
          <div class="vi-thumb">${v.thumbnail?`<img src="${v.thumbnail}"/>`:'▶'}</div>
          <div class="vi-info">
            <div class="vi-title">${v.title||'Untitled'}</div>
            <div class="vi-meta">${timeAgo(v.createdAt)}${v.duration?' • '+v.duration:''}</div>
          </div>
          <div class="vi-actions">
            <a class="btn-view" href="video.html?id=${d.id}" target="_blank">View</a>
            <button class="btn-del" onclick="delVideo('${d.id}',this)">Delete</button>
          </div>`;
        list.appendChild(el);
      });
    } catch(e) { list.innerHTML=`<div class="empty-list">Error: ${e.message}</div>`; }
  }

  window.delVideo = async (id, btn) => {
    if (!confirm('Delete karna chahte ho?')) return;
    btn.disabled=true; btn.textContent='...';
    try { await deleteDoc(doc(db,'videos',id)); toast('✓ Delete ho gayi!'); loadList(); }
    catch(e) { toast('Error: '+e.message, true); btn.disabled=false; btn.textContent='Delete'; }
  };
</script>
</body>
</html>
