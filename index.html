<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RXS Portal — Institutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --w: #ffffff; --off: #f7f7f9; --soft: #f0f0f5;
  --line: #e4e4ed; --line2: #d0d0e0;
  --ink: #0d0d1a; --ink2: #3a3a55; --ink3: #7a7a99;
  --gold: #e6a800; --gold-l: #fff7e0; --gold-m: #ffd54f;
  --red: #dc2626; --red-l: #fff1f1;
  --r: 14px;
  --sh: 0 2px 16px rgba(13,13,26,0.07);
  --shl: 0 8px 40px rgba(13,13,26,0.11);
}
body { font-family:'Inter',sans-serif; background:var(--w); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* TOPBAR */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.93); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  height:56px; padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:9px; text-decoration:none; }
.logo-mark {
  width:30px; height:30px; background:var(--ink); border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Sora',sans-serif; font-weight:800; font-size:12px; color:var(--gold-m);
}
.logo-name { font-family:'Sora',sans-serif; font-weight:700; font-size:15px; color:var(--ink); }
.pill {
  background:var(--gold-l); color:var(--gold); border:1px solid #ffd54f44;
  border-radius:50px; padding:4px 12px; font-size:11px; font-weight:600;
}

/* HERO */
.hero { padding:44px 20px 36px; max-width:640px; margin:0 auto; text-align:center; }
.eyebrow {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--gold); background:var(--gold-l); border:1px solid #ffd54f44;
  border-radius:50px; padding:5px 14px; margin-bottom:18px;
}
.hero h1 {
  font-family:'Sora',sans-serif; font-size:clamp(26px,5.5vw,44px);
  font-weight:800; letter-spacing:-1.2px; line-height:1.12; margin-bottom:12px;
}
.hero h1 em { font-style:normal; color:var(--gold); }
.hero p { font-size:14px; color:var(--ink3); line-height:1.65; max-width:380px; margin:0 auto; }

/* SEARCH */
.search-wrap { padding:0 20px 24px; max-width:560px; margin:0 auto; }
.search-inner {
  display:flex; align-items:center; gap:9px;
  background:var(--off); border:1.5px solid var(--line); border-radius:50px;
  padding:10px 18px; transition:border-color .18s, box-shadow .18s;
}
.search-inner:focus-within { border-color:var(--ink); background:var(--w); box-shadow:0 0 0 3px rgba(13,13,26,.06); }
.search-inner input { flex:1; background:transparent; border:none; outline:none; font-family:'Inter',sans-serif; font-size:13px; color:var(--ink); }
.search-inner input::placeholder { color:var(--ink3); }

hr.div { border:none; border-top:1px solid var(--line); margin:0 20px 24px; }

/* INSTITUTES LIST */
.inst-wrap { max-width:860px; margin:0 auto; padding:0 20px 60px; }
.sec-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.sec-label { font-size:11px; font-weight:600; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; }
.sec-count { font-size:12px; color:var(--ink3); }

.inst-list { display:flex; flex-direction:column; gap:10px; }

/* INSTITUTE ROW — long & thin */
.inst-row {
  background:var(--w); border:1.5px solid var(--line); border-radius:var(--r);
  display:flex; align-items:center; gap:0;
  cursor:pointer; overflow:hidden;
  transition:border-color .18s, box-shadow .18s, transform .18s;
}
.inst-row:hover { border-color:var(--line2); box-shadow:var(--sh); transform:translateX(3px); }

.inst-color-bar { width:4px; min-height:68px; flex-shrink:0; }

.inst-logo {
  width:48px; height:48px; border-radius:10px;
  background:var(--soft); margin:10px 14px;
  flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
.inst-logo img { width:100%; height:100%; object-fit:cover; }

.inst-info { flex:1; min-width:0; padding:14px 0; }
.inst-info h3 { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; letter-spacing:-.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inst-info p { font-size:12px; color:var(--ink3); margin-top:3px; }

.inst-meta { display:flex; align-items:center; gap:10px; padding:0 16px; flex-shrink:0; }
.inst-chevron { font-size:16px; color:var(--ink3); transition:transform .18s; }
.inst-row:hover .inst-chevron { transform:translateX(3px); color:var(--ink); }

/* STATE */
.state-box { padding:56px 24px; text-align:center; color:var(--ink3); }
.state-box .s-icon { font-size:36px; margin-bottom:12px; opacity:.5; }
.state-box h4 { font-family:'Sora',sans-serif; font-size:16px; color:var(--ink2); font-weight:700; margin-bottom:6px; }
.state-box p { font-size:13px; }
.spinner { width:28px; height:28px; border:2.5px solid var(--line); border-top-color:var(--ink); border-radius:50%; animation:spin .75s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── BATCHES VIEW ── */
#batchView {
  display:none; position:fixed; inset:0; z-index:300;
  background:var(--w); flex-direction:column;
  animation:slideIn .22s ease;
}
#batchView.active { display:flex; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

.bv-topbar {
  height:56px; background:var(--w); border-bottom:1px solid var(--line);
  padding:0 16px; display:flex; align-items:center; gap:12px; flex-shrink:0;
  position:sticky; top:0; z-index:10;
}
.btn-back {
  width:34px; height:34px; background:var(--off); border:1.5px solid var(--line);
  border-radius:9px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--ink); flex-shrink:0; transition:background .15s;
}
.btn-back:hover { background:var(--soft); }
.bv-sep { width:1px; height:22px; background:var(--line); flex-shrink:0; }
.bv-title { flex:1; min-width:0; }
.bv-title h4 { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bv-title span { font-size:11px; color:var(--ink3); }

.bv-body { flex:1; overflow-y:auto; padding:24px 20px 60px; max-width:860px; margin:0 auto; width:100%; }

.bv-inst-card {
  background:var(--off); border:1.5px solid var(--line); border-radius:var(--r);
  padding:16px 18px; margin-bottom:24px;
  display:flex; align-items:center; gap:14px;
}
.bv-inst-logo {
  width:44px; height:44px; border-radius:10px; background:var(--soft);
  flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:20px;
}
.bv-inst-logo img { width:100%; height:100%; object-fit:cover; }
.bv-inst-info h3 { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; letter-spacing:-.2px; }
.bv-inst-info p { font-size:12px; color:var(--ink3); margin-top:3px; }

.bv-label { font-size:11px; font-weight:600; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:14px; }

.batch-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* BATCH CARD — mini grid card */
.batch-row {
  background:var(--w); border:1.5px solid var(--line); border-radius:12px;
  cursor:pointer; overflow:hidden;
  transition:border-color .18s, box-shadow .18s, transform .18s;
  display:flex; flex-direction:column;
}
.batch-row:hover { border-color:var(--line2); box-shadow:var(--sh); transform:translateY(-2px); }

.batch-color-bar { height:3px; width:100%; background:var(--gold); flex-shrink:0; }

.batch-thumb-wrap {
  width:100%; height:84px; background:var(--soft);
  overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:26px;
  position:relative;
}
.batch-thumb-wrap img { width:100%; height:100%; object-fit:cover; }

.batch-tag-float {
  position:absolute; top:7px; left:7px;
  background:rgba(255,255,255,0.95); border:1px solid #ffd54f55; color:var(--gold);
  border-radius:5px; padding:2px 7px; font-size:9px; font-weight:700; letter-spacing:.03em;
}

.batch-info { padding:10px 11px 11px; }
.batch-info h4 { font-family:'Sora',sans-serif; font-size:12.5px; font-weight:700; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.batch-info p { font-size:10.5px; color:var(--ink3); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.batch-cta-row { display:flex; align-items:center; justify-content:flex-end; padding:0 11px 10px; }
.batch-chevron { font-size:13px; color:var(--ink3); transition:transform .18s, color .18s; }
.batch-row:hover .batch-chevron { transform:translateX(3px); color:var(--ink); }

/* ── COURSE VIEWER ── */
#courseView {
  display:none; position:fixed; inset:0; z-index:500;
  flex-direction:column; background:var(--w);
  animation:slideIn .22s ease;
}
#courseView.active { display:flex; }

.cv-topbar {
  height:54px; background:var(--w); border-bottom:1px solid var(--line);
  padding:0 16px; display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.cv-info { flex:1; min-width:0; }
.cv-info h4 { font-family:'Sora',sans-serif; font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cv-info span { font-size:11px; color:var(--ink3); }
.live-dot {
  display:flex; align-items:center; gap:5px;
  background:var(--red-l); border:1px solid #fca5a5; color:var(--red);
  font-size:11px; font-weight:700; border-radius:6px; padding:4px 10px; flex-shrink:0;
}
.live-dot::before { content:''; width:6px; height:6px; background:var(--red); border-radius:50%; animation:pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.8);} }

.frame-wrap { flex:1; position:relative; overflow:hidden; }
#courseFrame {
  width:100%; height:100%; border:none; background:var(--w);
  display:block;
}
.frame-loading {
  position:absolute; inset:0; background:var(--w);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .35s;
}
.frame-loading.hidden { opacity:0; pointer-events:none; }
.frame-loading p { font-size:13px; color:var(--ink3); margin-top:10px; }

@media(max-width:600px){
  .hero { padding:32px 16px 28px; }
  .search-wrap,.inst-wrap { padding-left:16px; padding-right:16px; }
  hr.div { margin:0 16px 20px; }
  .bv-body { padding:20px 16px 60px; }
  .batch-tag { display:none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="logo">
    <div class="logo-mark">RX</div>
    <span class="logo-name">RXS Portal</span>
  </div>
  <span class="pill">⚡ Live</span>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="eyebrow">🏛 Top Institutes</div>
  <h1>Choose your<br><em>institute.</em></h1>
  <p>Select an institute to browse its batches and start learning.</p>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <span style="color:var(--ink3);font-size:14px;">🔍</span>
    <input type="text" id="searchInput" placeholder="Search institutes…" oninput="filterInstitutes()" />
  </div>
</div>

<hr class="div" />

<!-- INSTITUTES -->
<div class="inst-wrap">
  <div class="sec-meta">
    <span class="sec-label">All Institutes</span>
    <span class="sec-count" id="instCount"></span>
  </div>
  <div class="inst-list" id="instList">
    <div class="state-box">
      <div class="spinner"></div>
      <h4>Loading institutes…</h4>
    </div>
  </div>
</div>

<!-- BATCH VIEW -->
<div id="batchView">
  <div class="bv-topbar">
    <button class="btn-back" onclick="closeBatchView()">←</button>
    <div class="bv-sep"></div>
    <div class="bv-title">
      <h4 id="bvInstName">Institute</h4>
      <span>Select a batch</span>
    </div>
  </div>
  <div class="bv-body">
    <div class="bv-inst-card" id="bvInstCard"></div>
    <div class="search-wrap" style="padding:0 0 18px;max-width:100%;">
      <div class="search-inner">
        <span style="color:var(--ink3);font-size:14px;">🔍</span>
        <input type="text" id="batchSearchInput" placeholder="Search batches…" oninput="filterBatches()" />
      </div>
    </div>
    <div class="bv-label" id="bvBatchLabel">Batches</div>
    <div id="batchList"></div>
  </div>
</div>

<!-- COURSE VIEWER -->
<div id="courseView">
  <div class="cv-topbar">
    <button class="btn-back" onclick="closeCourse()">←</button>
    <div class="bv-sep"></div>
    <div class="cv-info">
      <h4 id="cvTitle">Batch</h4>
      <span id="cvInst">Institute</span>
    </div>
    <div class="live-dot">LIVE</div>
  </div>
  <div class="frame-wrap">
    <div class="frame-loading" id="frameLoading">
      <div class="spinner"></div>
      <p>Opening batch…</p>
    </div>
    <iframe id="courseFrame" src="" onload="frameLoaded()" scrolling="yes" allow="fullscreen" style="-webkit-overflow-scrolling:touch;"></iframe>
  </div>
</div>

<script>
const BIN_ID = '6a3019c2da38895dfec463b5';
const KEY = '$2a$10$ZvJXK0tZDFnVp7i4K6WL8ulOCKwRo3vYSwvJ3zQlekyCzTVajImJa';

let allInstitutes = [];
let currentInst = null;

const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4'];

async function loadData() {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers:{'X-Master-Key':KEY} });
    const d = await r.json();
    allInstitutes = d.record.institutes || [];
    renderInstitutes(allInstitutes);
  } catch {
    document.getElementById('instList').innerHTML = `<div class="state-box"><div class="s-icon">⚠️</div><h4>Could not load</h4><p>Check your connection and refresh.</p></div>`;
  }
}

function renderInstitutes(list) {
  const el = document.getElementById('instList');
  document.getElementById('instCount').textContent = list.length ? `${list.length} institutes` : '';
  if (!list.length) {
    el.innerHTML = `<div class="state-box"><div class="s-icon">🏛</div><h4>No institutes yet</h4><p>Admin se add karwao.</p></div>`;
    return;
  }
  el.innerHTML = list.map((inst, i) => {
    const color = COLORS[i % COLORS.length];
    const bCount = (inst.batches || []).length;
    return `<div class="inst-row" onclick="openBatchView(${i})">
      <div class="inst-color-bar" style="background:${color}"></div>
      <div class="inst-logo">
        ${inst.logo ? `<img src="${inst.logo}" onerror="this.parentElement.innerHTML='🏫'" />` : '🏫'}
      </div>
      <div class="inst-info">
        <h3>${inst.name}</h3>
        <p>${inst.description || 'Tap to view batches'}</p>
      </div>
      <div class="inst-meta">
        <span class="inst-chevron">→</span>
      </div>
    </div>`;
  }).join('');
}

function filterInstitutes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderInstitutes(allInstitutes.filter(i =>
    i.name.toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q)
  ));
}

let currentInstColor = '#6366f1';

function openBatchView(idx) {
  currentInst = allInstitutes[idx];
  currentInstColor = COLORS[idx % COLORS.length];
  document.getElementById('bvInstName').textContent = currentInst.name;
  document.getElementById('batchSearchInput').value = '';

  // Inst card
  document.getElementById('bvInstCard').innerHTML = `
    <div class="bv-inst-logo">
      ${currentInst.logo ? `<img src="${currentInst.logo}" onerror="this.parentElement.innerHTML='🏫'" />` : '🏫'}
    </div>
    <div class="bv-inst-info">
      <h3>${currentInst.name}</h3>
      <p>${currentInst.description || ''}</p>
    </div>`;

  renderBatches(currentInst.batches || []);

  document.getElementById('batchView').classList.add('active');
  document.body.style.overflow = 'hidden';
  history.pushState({batch:true}, currentInst.name, '#batches');
}

function renderBatches(batches) {
  document.getElementById('bvBatchLabel').textContent = `${batches.length} Batch${batches.length !== 1 ? 'es' : ''}`;

  if (!batches.length) {
    document.getElementById('batchList').innerHTML = `<div class="state-box"><div class="s-icon">📚</div><h4>No batches found</h4><p>Try a different search.</p></div>`;
    return;
  }

  document.getElementById('batchList').innerHTML = `<div class="batch-grid">${batches.map((b) => `
    <div class="batch-row" onclick="openCourse('${encodeURIComponent(b.url)}','${encodeURIComponent(b.name)}','${encodeURIComponent(currentInst.name)}')">
      <div class="batch-color-bar" style="background:${currentInstColor}"></div>
      <div class="batch-thumb-wrap">
        ${b.thumbnail ? `<img src="${b.thumbnail}" onerror="this.parentElement.innerHTML='📖'" />` : '📖'}
        ${b.tag ? `<span class="batch-tag-float">${b.tag}</span>` : ''}
      </div>
      <div class="batch-info">
        <h4>${b.name}</h4>
        <p>${b.description || 'Tap to open'}</p>
      </div>
      <div class="batch-cta-row">
        <span class="batch-chevron">→</span>
      </div>
    </div>`).join('')}
  </div>`;
}

function filterBatches() {
  const q = document.getElementById('batchSearchInput').value.toLowerCase();
  const all = currentInst.batches || [];
  const filtered = all.filter(b =>
    b.name.toLowerCase().includes(q) ||
    (b.tag || '').toLowerCase().includes(q) ||
    (b.description || '').toLowerCase().includes(q)
  );
  renderBatches(filtered);
}

function closeBatchView() {
  document.getElementById('batchView').classList.remove('active');
  document.body.style.overflow = '';
  history.pushState({}, '', window.location.pathname);
}

function openCourse(encUrl, encName, encInst) {
  const url = decodeURIComponent(encUrl);
  const name = decodeURIComponent(encName);
  const inst = decodeURIComponent(encInst);
  document.getElementById('cvTitle').textContent = name;
  document.getElementById('cvInst').textContent = inst;
  document.getElementById('courseFrame').src = url;
  document.getElementById('frameLoading').classList.remove('hidden');
  document.getElementById('courseView').classList.add('active');
  history.pushState({course:true}, name, '#course');
}

function closeCourse() {
  document.getElementById('courseView').classList.remove('active');
  document.getElementById('courseFrame').src = '';
  history.pushState({batch:true}, '', '#batches');
}

function frameLoaded() {
  document.getElementById('frameLoading').classList.add('hidden');
}

window.addEventListener('popstate', e => {
  if (document.getElementById('courseView').classList.contains('active')) {
    document.getElementById('courseView').classList.remove('active');
    document.getElementById('courseFrame').src = '';
  } else if (document.getElementById('batchView').classList.contains('active')) {
    document.getElementById('batchView').classList.remove('active');
    document.body.style.overflow = '';
  }
});

loadData();
</script>
</body>
</html>
