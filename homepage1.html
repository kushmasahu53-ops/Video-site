<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VideoZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;
      --accent:#e53935;--text:#f1f1f1;--muted:#777;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

    /* NAV */
    nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;height:54px;
      background:#111;border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
    }
    .logo{font-size:1.1rem;font-weight:700;color:var(--accent)}
    .search input{
      background:var(--surface);border:1px solid var(--border);
      border-radius:6px;padding:7px 12px;color:var(--text);
      font-family:'Inter',sans-serif;font-size:0.82rem;
      width:180px;outline:none;transition:border-color 0.2s;
    }
    .search input:focus{border-color:#444}

    /* AD */

    /* HEADER */
    .page-header{padding:14px 14px 10px}
    .page-header h1{font-size:1rem;font-weight:700;margin-bottom:2px}
    .page-header p{color:var(--muted);font-size:0.75rem}

    /* GRID — 2 columns always */
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      padding:0 14px 20px;
    }

    /* CARD */
    .card{
      background:var(--surface);border-radius:8px;
      border:1px solid var(--border);overflow:hidden;
      text-decoration:none;color:inherit;display:block;
      transition:border-color 0.2s,transform 0.18s;
    }
    .card:hover{border-color:#3a3a3a;transform:translateY(-2px)}

    /* THUMBNAIL */
    .thumb{
      position:relative;width:100%;
      aspect-ratio:16/9;background:#111;overflow:hidden;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
    .card:hover .thumb img{transform:scale(1.04)}
    .no-thumb{
      width:100%;height:100%;display:flex;
      align-items:center;justify-content:center;
      font-size:1.6rem;color:#2a2a2a;
    }
    .play-overlay{
      position:absolute;inset:0;display:flex;
      align-items:center;justify-content:center;
      background:rgba(0,0,0,0.25);
      opacity:0;transition:opacity 0.2s;
    }
    .card:hover .play-overlay{opacity:1}
    .play-circle{
      width:34px;height:34px;background:var(--accent);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
    }
    .play-circle svg{width:13px;height:13px;fill:#fff;margin-left:2px}
    .duration{
      position:absolute;bottom:5px;right:6px;
      background:rgba(0,0,0,0.82);color:#fff;
      font-size:0.65rem;font-weight:600;
      padding:1px 5px;border-radius:3px;
    }
    .new-tag{
      position:absolute;top:5px;left:6px;
      background:var(--accent);color:#fff;
      font-size:0.58rem;font-weight:700;letter-spacing:0.8px;
      padding:1px 6px;border-radius:3px;text-transform:uppercase;
    }

    /* CARD BODY */
    .card-body{padding:8px 9px 10px}
    .card-title{
      font-size:0.78rem;font-weight:600;line-height:1.4;
      display:-webkit-box;-webkit-line-clamp:2;
      -webkit-box-orient:vertical;overflow:hidden;
      margin-bottom:5px;
    }
    .card-meta{color:var(--muted);font-size:0.7rem}

    /* STATES */
    .loading{
      text-align:center;padding:60px 20px;
      color:var(--muted);font-size:0.85rem;
      grid-column:1/-1;
    }
    .spinner{
      width:28px;height:28px;
      border:2px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin:0 auto 10px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{
      text-align:center;padding:60px 20px;
      color:var(--muted);grid-column:1/-1;
    }
    .empty h2{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:6px}

    footer{
      text-align:center;padding:16px;
      color:#333;font-size:0.72rem;
      border-top:1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">▶ VideoZone</div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search..." oninput="filterVideos()"/>
  </div>
</nav>


<div class="page-header">
  <h1>Latest Videos</h1>
  <p>Roz nayi videos — sabse latest upar</p>
</div>

<div class="grid" id="grid">
  <div class="loading">
    <div class="spinner"></div>
    Load ho rahi hain...
  </div>
</div>


<footer>© 2025 VideoZone</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvs0Nofybzj7l-gMAaJmMgE0DF8TurjTs",
    authDomain: "my-video-site-b973e.firebaseapp.com",
    projectId: "my-video-site-b973e",
    storageBucket: "my-video-site-b973e.firebasestorage.app",
    messagingSenderId: "308515367269",
    appId: "1:308515367269:web:19e2ee804c9f461a46d98c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allVideos = [];

  function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const s = Math.floor((Date.now() - d) / 1000);
    if (s < 60) return 'Abhi abhi';
    if (s < 3600) return Math.floor(s/60) + ' min pehle';
    if (s < 86400) return Math.floor(s/3600) + ' ghante pehle';
    return Math.floor(s/86400) + ' din pehle';
  }

  function isNew(ts) {
    if (!ts) return false;
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return Date.now() - d < 86400000;
  }

  function renderCards(list) {
    const grid = document.getElementById('grid');
    if (!list.length) {
      grid.innerHTML = `<div class="empty">
        <h2>Koi video nahi mili</h2>
        <p>Baad mein check karo</p>
      </div>`;
      return;
    }
    grid.innerHTML = list.map((v, i) => `
      <a class="card" href="video.html?id=${v.id}">
        <div class="thumb">
          ${v.thumbnail
            ? `<img src="${v.thumbnail}" alt="${v.title}" loading="lazy"/>`
            : `<div class="no-thumb">▶</div>`}
          <div class="play-overlay">
            <div class="play-circle">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          ${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
          ${isNew(v.createdAt) ? `<span class="new-tag">New</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${v.title || 'Untitled'}</div>
          <div class="card-meta">${timeAgo(v.createdAt)}</div>
        </div>
      </a>`).join('');
  }

  window.filterVideos = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderCards(q ? allVideos.filter(v => (v.title||'').toLowerCase().includes(q)) : allVideos);
  };

  async function load() {
    const grid = document.getElementById('grid');
    try {
      const snap = await getDocs(query(collection(db, 'videos'), orderBy('createdAt', 'desc')));
      snap.forEach(d => allVideos.push({ id: d.id, ...d.data() }));
      if (!allVideos.length) {
        grid.innerHTML = `<div class="empty"><h2>Abhi koi video nahi</h2><p>Admin se upload karwao</p></div>`;
      } else {
        renderCards(allVideos);
      }
    } catch(e) {
      grid.innerHTML = `<div class="empty"><h2>Error</h2><p>${e.message}</p></div>`;
    }
  }

  load();
</script>
</body>
</html>
