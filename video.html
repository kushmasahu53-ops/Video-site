<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video - VideoZone</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DYCJC4TZNM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DYCJC4TZNM');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --accent: #ff3c3c;
      --accent2: #ff8c00;
      --text: #f0f0f0;
      --muted: #888;
      --border: #222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10,10,15,0.95);
      border-bottom: 2px solid var(--accent);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .back-btn {
      color: var(--text); text-decoration: none; font-weight: 600;
      font-size: 0.95rem; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* AD */
    .ad-banner {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      border: 1px solid #333; border-radius: 8px;
      padding: 16px; text-align: center;
      color: var(--muted); font-size: 0.85rem; letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* VIDEO PLAYER */
    .player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .player-wrap video {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* VIDEO INFO */
    .video-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .video-meta {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .view-count {
      color: var(--accent);
      font-weight: 700;
    }
    .video-desc {
      background: var(--card);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 1rem;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
    }

    /* RELATED VIDEOS */
    .related-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 3px;
      margin-bottom: 16px;
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .video-card {
      background: var(--card); border-radius: 10px;
      overflow: hidden; border: 1px solid var(--border);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: pointer; text-decoration: none; color: inherit; display: block;
    }
    .video-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 6px 24px rgba(255,60,60,0.2);
    }
    .thumb-wrap {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #1a1a2a; overflow: hidden;
    }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .no-thumb {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
      color: var(--muted); font-size: 2rem;
    }
    .card-info { padding: 12px 14px; }
    .card-title {
      font-size: 0.95rem; font-weight: 700;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 6px;
    }
    .card-meta { color: var(--muted); font-size: 0.8rem; }

    .loading {
      text-align: center; padding: 60px;
      color: var(--muted); font-size: 1rem; letter-spacing: 2px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center; padding: 24px;
      color: var(--muted); font-size: 0.85rem;
      border-top: 1px solid var(--border);
      letter-spacing: 1px; margin-top: 40px;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">VideoZone</a>
    <a class="back-btn" href="index.html">← Wapas Jao</a>
  </nav>

  <!-- TOP AD -->
  <div class="container">
    <div class="ad-banner">📢 ADVERTISEMENT</div>
  </div>

  <div class="container" id="mainContent">
    <div class="loading"><div class="spinner"></div>Video load ho rahi hai...</div>
  </div>

  <footer>© 2025 VideoZone — All Rights Reserved</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, getDoc as gd, updateDoc, increment, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvs0Nofybzj7l-gMAaJmMgE0DF8TurjTs",
      authDomain: "my-video-site-b973e.firebaseapp.com",
      projectId: "my-video-site-b973e",
      storageBucket: "my-video-site-b973e.firebasestorage.app",
      messagingSenderId: "308515367269",
      appId: "1:308515367269:web:19e2ee804c9f461a46d98c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function timeAgo(ts) {
      if (!ts) return '';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Math.floor((Date.now() - date) / 1000);
      if (diff < 60) return 'Abhi abhi';
      if (diff < 3600) return Math.floor(diff/60) + ' min pehle';
      if (diff < 86400) return Math.floor(diff/3600) + ' ghante pehle';
      return Math.floor(diff/86400) + ' din pehle';
    }

    const params = new URLSearchParams(location.search);
    const videoId = params.get('id');

    async function loadVideo() {
      const main = document.getElementById('mainContent');
      if (!videoId) { main.innerHTML = '<p style="color:red;padding:40px">Video ID nahi mila!</p>'; return; }

      try {
        const docRef = doc(db, 'videos', videoId);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) { main.innerHTML = '<p style="color:red;padding:40px">Video nahi mili!</p>'; return; }

        const v = docSnap.data();
        document.title = (v.title || 'Video') + ' - VideoZone';

        // View count increment
        try {
          await updateDoc(doc(db, 'videos', videoId), { views: increment(1) });
        } catch(e) {}
        const views = (v.views || 0) + 1;

        // Load related videos
        const q = query(collection(db, 'videos'), orderBy('createdAt', 'desc'), limit(7));
        const snap = await getDocs(q);
        let relatedHtml = '';
        snap.forEach(d => {
          if (d.id === videoId) return;
          const rv = d.data();
          relatedHtml += `
          <a class="video-card" href="video.html?id=${d.id}">
            <div class="thumb-wrap">
              ${rv.thumbnail ? `<img src="${rv.thumbnail}" alt="${rv.title}" loading="lazy"/>` : `<div class="no-thumb">▶</div>`}
            </div>
            <div class="card-info">
              <div class="card-title">${rv.title || 'Untitled'}</div>
              <div class="card-meta">${timeAgo(rv.createdAt)}</div>
            </div>
          </a>`;
        });

        main.innerHTML = `
          <div class="player-wrap">
            <video controls autoplay>
              <source src="${v.videoUrl}" type="video/mp4"/>
              Aapka browser video support nahi karta.
            </video>
          </div>

          <h1 class="video-title">${v.title || 'Untitled'}</h1>
          <div class="video-meta">
            <span>📅 ${timeAgo(v.createdAt)}</span>
            ${v.duration ? `<span>⏱ ${v.duration}</span>` : ''}
            <span class="view-count">👁 ${views} views</span>
          </div>

          ${v.description ? `<div class="video-desc">${v.description}</div>` : ''}

          <!-- MID AD -->
          <div class="ad-banner" style="margin-bottom:24px">📢 ADVERTISEMENT</div>

          ${relatedHtml ? `
          <div class="related-title">More Videos</div>
          <div class="related-grid">${relatedHtml}</div>
          ` : ''}
        `;
      } catch(e) {
        main.innerHTML = `<p style="color:red;padding:40px">Error: ${e.message}</p>`;
      }
    }

    loadVideo();
  </script>
</body>
</html>
